name: Build RunPod Worker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "web_saas/worker/**"
      - "web_saas/backend/requirements.txt"
      - "voice_models/**"
      - "download_checkpoints_ezycloud.sh"
      - "prepare_runpod_models.sh"
      - ".github/workflows/build-runpod-ghcr.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER}/${REPO}/tunlipsyn-runpod-worker" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web_saas/worker/Dockerfile.runpod
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
